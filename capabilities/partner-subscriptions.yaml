name: calm-partner-subscriptions
description: >-
  Provision, manage, and revoke Calm Business or Calm Health subscriptions for
  partner end users via the Calm Partner API. Wraps OAuth client_credentials
  authentication and the three v0/b2b subscription lifecycle endpoints.
provider: calm
api: calm-partner-api
operations:
  - id: authorize
    method: POST
    path: /v0/authorize
    summary: Authorize partner service and obtain a JWT access token.
  - id: link_user
    method: POST
    path: /v0/b2b/users/link
    summary: Link a partner user to a Calm subscription.
  - id: cancel_user
    method: DELETE
    path: /v0/b2b/users/{partner_user_id}
    summary: Cancel a partner user subscription.
inputs:
  - name: client_id
    required: true
    secret: false
  - name: client_secret
    required: true
    secret: true
  - name: partner_user_id
    required: true
outputs:
  - name: access_token
  - name: link_url
  - name: subscription_status
sandbox:
  base_url: https://auth-ga.aws-dev.useast1.calm.com
production:
  base_url: https://auth.calm.com
