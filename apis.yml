apis:
  - aid: calm-com:calm-partner-api
    name: Calm Partner API
    description: >-
      OAuth 2.0 client-credentials REST API used by Calm Business and Calm Health partners to provision and revoke Calm
      subscriptions for partner end users. Three operations cover the lifecycle - authorize the partner service, link a
      partner user, and cancel a partner user subscription. Credentials (client_id, client_secret) are issued by Calm's
      B2B Engineering Team and the API is served from auth.calm.com (production) and auth-ga.aws-dev.useast1.calm.com
      (development).
    humanURL: https://partner.calm.com/docs/api
    tags:
      - Partner
      - Subscriptions
      - B2B
      - Provisioning
      - Authentication
